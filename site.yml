---
- hosts: elkservers
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Ensure Java Runtime Environment is installed
      apt:
        name: default-jre
        state: present

    - name: Set vm.max_map_count for Elasticsearch
      sysctl:
        name: vm.max_map_count
        value: 262144
        state: present
        reload: yes

  vars:
    es_version: "9.3.3"
    kibana_version: "9.3.3"
    logstash_version: "9.3.3"
    filebeat_version: "9.3.3"
    es_heap_size: "512m"   # la heap JVM

  handlers:
    - name: restart elasticsearch
      service:
        name: elasticsearch
        state: restarted

    - name: restart kibana
      service:
        name: kibana
        state: restarted

    - name: restart logstash
      service:
        name: logstash
        state: restarted

    - name: restart filebeat
      service:
        name: filebeat
        state: restarted

  tasks:

    # =========================
    # Elasticsearch
    # =========================
    - name: Download Elasticsearch deb package
      get_url:
        url: "https://artifacts.elastic.co/downloads/elasticsearch/elasticsearch-{{ es_version }}-amd64.deb"
        dest: /tmp/elasticsearch-{{ es_version }}-amd64.deb
        mode: '0644'

    - name: Install Elasticsearch deb package
      apt:
        deb: /tmp/elasticsearch-{{ es_version }}-amd64.deb

    - name: Configure Elasticsearch jvm.options
      lineinfile:
        path: /etc/elasticsearch/jvm.options
        regexp: '^-Xms'
        line: "-Xms{{ es_heap_size }}"
      notify: restart elasticsearch

    - name: Ensure Xmx matches Xms in jvm.options
      lineinfile:
        path: /etc/elasticsearch/jvm.options
        regexp: '^-Xmx'
        line: "-Xmx{{ es_heap_size }}"
      notify: restart elasticsearch

    - name: Deploy elasticsearch.yml from template
      template:
        src: elasticsearch.yml.j2
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: '0644'
      notify: restart elasticsearch

    - name: Ensure Elasticsearch service is enabled and started
      service:
        name: elasticsearch
        state: started
        enabled: yes

    # =========================
    # Kibana
    # =========================
    - name: Download Kibana deb package
      get_url:
        url: "https://artifacts.elastic.co/downloads/kibana/kibana-{{ kibana_version }}-amd64.deb"
        dest: /tmp/kibana-{{ kibana_version }}-amd64.deb
        mode: '0644'

    - name: Install Kibana deb package
      apt:
        deb: /tmp/kibana-{{ kibana_version }}-amd64.deb

    - name: Deploy kibana.yml from template
      template:
        src: kibana.yml.j2
        dest: /etc/kibana/kibana.yml
        owner: root
        group: kibana
        mode: '0644'
      notify: restart kibana

    - name: Ensure Kibana service is enabled and started
      service:
        name: kibana
        state: started
        enabled: yes

    # =========================
    # Logstash
    # =========================
    - name: Download Logstash deb package
      get_url:
        url: "https://artifacts.elastic.co/downloads/logstash/logstash-{{ logstash_version }}-amd64.deb"
        dest: /tmp/logstash-{{ logstash_version }}-amd64.deb
        mode: '0644'

    - name: Install Logstash deb package
      apt:
        deb: /tmp/logstash-{{ logstash_version }}-amd64.deb

    - name: Deploy Logstash pipeline config
      template:
        src: logstash-main.conf.j2
        dest: /etc/logstash/conf.d/main.conf
        owner: root
        group: logstash
        mode: '0644'
      notify: restart logstash

    - name: Ensure Logstash service is enabled and started
      service:
        name: logstash
        state: started
        enabled: yes

    # =========================
    # Filebeat
    # =========================
    - name: Download Filebeat deb package
      get_url:
        url: "https://artifacts.elastic.co/downloads/beats/filebeat/filebeat-{{ filebeat_version }}-amd64.deb"
        dest: /tmp/filebeat-{{ filebeat_version }}-amd64.deb
        mode: '0644'

    - name: Install Filebeat deb package
      apt:
        deb: /tmp/filebeat-{{ filebeat_version }}-amd64.deb

    - name: Deploy filebeat.yml from template
      template:
        src: filebeat.yml.j2
        dest: /etc/filebeat/filebeat.yml
        owner: root
        group: root
        mode: '0644'
      notify: restart filebeat

    - name: Ensure Filebeat service is enabled and started
      service:
        name: filebeat
        state: started
        enabled: yes
